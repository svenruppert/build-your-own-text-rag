m03.header.subtitle=Vier Chunker gegen denselben Text. \u00dcberlappungszonen erscheinen als optisch dichtere, farbige Bereiche. Klicken Sie auf einen Legendeneintrag, um den entsprechenden Chunk im Text oben hervorzuheben.
