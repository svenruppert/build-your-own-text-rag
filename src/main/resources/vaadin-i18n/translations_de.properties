m03.default.text=# Einf\u00fchrung\n\nWillkommen im Chunking-Labor. Passen Sie die Parameter unten an,\nw\u00e4hlen Sie einen Chunker und beobachten Sie, wie dieselbe Eingabe\nzu unterschiedlichen Chunks wird. \u00dcberlappungszonen erscheinen als\ndichtere, farbige Bereiche.\n\n## Motivation\n\nBei der Indizierung wird ein \u00fcberraschend gro\u00dfer Teil der\nAbrufqualit\u00e4t entschieden. Feste Chunk-Gr\u00f6\u00dfe ist schnell, trennt\naber W\u00f6rter und S\u00e4tze mittendurch. \u00dcberlappende Aufteilung h\u00e4lt\ngrenzkritische Informationen abrufbar. Satz-Chunking respektiert\nnat\u00fcrliche Satzgrenzen. Strukturbewusstes Chunking richtet Chunks\nan \u00dcberschriften aus, sodass jeder Chunk seinen eigenen Pfad tr\u00e4gt.\n\n## Praktischer Tipp\n\nProbieren Sie denselben Text mit jedem Chunker nacheinander.\nAchten Sie auf die \u00dcberlappungszonen im Tab *\u00dcberlappend*, und\nwechseln Sie dann zu *Satz*, um zu sehen, wie Satzgrenzen die\nR\u00e4nder verschieben.

