main.module1.title=Chat
main.module1.desc=Der Ollama-Client, der im gesamten Workshop verwendet wird. Beginnt einfach \u2013 jedes Modul baut darauf auf.

main.module2.title=Vektorspeicher
main.module2.desc=EclipseStore mit JVector. Persistente Rohvektoren, HNSW-Index wird bei Bedarf neu aufgebaut.

main.module3.title=Chunking
main.module3.desc=Vier Chunking-Strategien, von fester Gr\u00f6\u00dfe bis strukturbewusst. Designentscheidungen, keine neutrale Vorverarbeitung.

main.module4.title=Retrieval
main.module4.desc=Vektorsuche, BM25, hybride Fusion und ein LLM-als-Richter-Reranker. Vier Strategien, ein Retriever-Interface.

main.module5.title=Generierung
main.module5.desc=Fundierte Antworten mit Inline-Attribution. Streaming-Token, Verweigerungserkennung, optionale Fundierungspr\u00fcfung.

main.module6.title=Produkt
main.module6.desc=Alle sechs Module zu einem produktionsreifen RAG-System zusammengesetzt. Das fertige Artefakt.

