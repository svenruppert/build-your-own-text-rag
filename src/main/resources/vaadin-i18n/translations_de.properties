main.hero.subtitle=Willkommen. Sie bauen ein selbst gehostetes RAG-System \u2014 sechs Module, jedes ein Baustein. Das Bild unten zeigt die Architektur, die Sie zusammensetzen. Nutzen Sie die Modulkarten zum Einstieg.

